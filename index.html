<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANKA Skincare Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f7f8fc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: white;
  width: 400px;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.logo {
  text-align: center;
  margin-bottom: 25px;
}

.logo h1 {
  font-size: 28px;
  color: #111827;
}

.logo p {
  color: #666;
  margin-top: 8px;
  font-size: 14px;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #111827;
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: bold;
  color: #374151;
}

input {
  width: 100%;
  padding: 14px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 15px;
}

input:focus {
  outline: none;
  border-color: #2563eb;
}

button {
  width: 100%;
  padding: 14px;
  background: #111827;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #1f2937;
}

#error {
  margin-top: 15px;
  text-align: center;
  color: #dc2626;
  font-size: 14px;
  display: none;
}

.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 13px;
  color: #777;
}
</style>
</head>
<body>

<div class="login-box">

  <div class="logo">
    <h1>ANKA Skincare</h1>
    <p>Inventory Management System</p>
  </div>

  <h2>Login</h2>

  <div class="input-group">
    <label>Username</label>
    <input
      type="text"
      id="username"
      placeholder="Enter username"
    >
  </div>

  <div class="input-group">
    <label>Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter password"
    >
  </div>

  <button onclick="login()">Login</button>

  <div id="error">Invalid username or password</div>

  <div class="footer">
    Secure access for authorized staff only
  </div>

</div>

<script>

/* ===================================
GITHUB PAGES LOGIN CALLBACK HANDLER
=================================== */

const params = new URLSearchParams(window.location.search);

if (params.get("login") === "success") {

  const user = params.get("user");
  const role = params.get("role");

  localStorage.setItem("user", user);
  localStorage.setItem("role", role);

  if (role === "admin") {
    window.location.href = "admin-dashboard.html";
  } else {
    window.location.href = "SINV.html";
  }
}

if (params.get("login") === "fail") {
  document.getElementById("error").innerText =
    "Invalid username or password";
  document.getElementById("error").style.display = "block";
}

/* ===================================
AUTO REDIRECT IF ALREADY LOGGED IN
=================================== */

const existingUser = localStorage.getItem("user");
const existingRole = localStorage.getItem("role");

if (existingUser) {
  if (existingRole === "admin") {
    window.location.href = "admin-dashboard.html";
  } else {
    window.location.href = "SINV.html";
  }
}

/* ===================================
GOOGLE APPS SCRIPT URL
=================================== */

const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbzObXviRyBq_uktnGna465i0DHdPww8NBVBtCMFoun0cQUKMmcn-R3ttIfqshR0_rno/exec";

/*
IMPORTANT:
Replace the above URL with your REAL
Google Apps Script Web App /exec URL
*/

/* ===================================
LOGIN FUNCTION (NO FETCH = NO CORS)
=================================== */

function login() {

  const username =
    document.getElementById("username").value.trim();

  const password =
    document.getElementById("password").value.trim();

  const error =
    document.getElementById("error");

  error.style.display = "none";

  if (!username || !password) {
    error.innerText =
      "Please enter username and password";
    error.style.display = "block";
    return;
  }

  const url =
    SCRIPT_URL +
    "?action=login" +
    "&username=" + encodeURIComponent(username) +
    "&password=" + encodeURIComponent(password);

  /*
  IMPORTANT:
  This avoids fetch() completely
  and fixes CORS issues permanently
  */

  window.location.href = url;
}

</script>

</body>
</html>
