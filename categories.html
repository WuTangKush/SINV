<!DOCTYPE html>
<html>
<head>
<title>Categories | ANKA Skincare</title>

<style>
body { font-family: Arial; background:#f7f8fc; padding:40px; }
.box { background:white; padding:20px; max-width:400px; margin:auto; border-radius:12px; }
input, button { width:100%; padding:12px; margin-top:10px; }
button { background:#111827; color:white; border:none; border-radius:8px; }
</style>
</head>

<body>

<div class="box">
  <h2>Create Category</h2>

  <input id="category" placeholder="Enter category name">
  <button onclick="saveCategory()">Save</button>

  <p id="msg"></p>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzObXviRyBq_uktnGna465i0DHdPww8NBVBtCMFoun0cQUKMmcn-R3ttIfqshR0_rno/exec";

function saveCategory() {

  const category = document.getElementById("category").value;
  const msg = document.getElementById("msg");

  const role = localStorage.getItem("role");

  fetch(SCRIPT_URL + "?action=addCategory&category=" + encodeURIComponent(category) + "&role=" + role)
    .then(res => res.json())
    .then(data => {

      if (data.status === "success") {
        msg.innerText = "Category added";
        document.getElementById("category").value = "";
      } else {
        msg.innerText = data.message;
      }

    });

}

</script>

</body>
</html>
