<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Stock | ANKA Skincare</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f7f8fc;
  color: #333;
}

/* TOP NAVBAR */
.navbar {
  background: #111827;
  color: white;
  padding: 18px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-actions button {
  margin-left: 10px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.home-btn {
  background: white;
  color: #111827;
}

.logout-btn {
  background: #dc2626;
  color: white;
}

/* MAIN CONTAINER */
.container {
  max-width: 700px;
  margin: 50px auto;
  padding: 20px;
}

.page-title {
  margin-bottom: 25px;
}

.page-title h1 {
  font-size: 30px;
  margin-bottom: 8px;
}

.page-title p {
  color: #666;
}

/* FORM CARD */
.form-card {
  background: white;
  padding: 35px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  font-size: 14px;
  color: #374151;
}

select,
input {
  width: 100%;
  padding: 14px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 15px;
}

select:focus,
input:focus {
  outline: none;
  border-color: #2563eb;
}

/* SELL BUTTON */
.sell-btn {
  width: 100%;
  padding: 14px;
  background: #111827;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.sell-btn:hover {
  background: #1f2937;
}

/* MESSAGE */
#msg {
  margin-top: 18px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
}

.success {
  color: green;
}

.error {
  color: #dc2626;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">ANKA Skincare</div>

  <div class="nav-actions">
    <button class="home-btn" onclick="goHome()">🏠 Home</button>
    <button class="logout-btn" onclick="manualLogout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="page-title">
    <h1>Sell Stock</h1>
    <p>Record product sales and automatically update inventory.</p>
  </div>

  <div class="form-card">

    <div class="form-group">
      <label>Select Product</label>
      <select id="product">
        <option value="">Loading products...</option>
      </select>
    </div>

    <div class="form-group">
      <label>Units to Sell</label>
      <input type="number" id="units" placeholder="Enter units to sell">
    </div>

    <h3>Scan to Sell</h3>

    <div id="reader"></div>
    <button onclick="startSellScanner()">Scan Product</button>

    <p>Product: <span id="scannedProduct"></span></p>

    <button class="sell-btn" onclick="sellStock()">Sell Product</button>

    <p id="msg"></p>

  </div>

</div>

<script>

function startSellScanner() {

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

  const cameraId = devices[0].id;

  scanner.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      document.getElementById("scannedProduct").innerText = decodedText;
      document.getElementById("product").value = decodedText;

      scanner.stop();
    }
  );

});

}
/* =====================================
SESSION CHECK
===================================== */

const user = localStorage.getItem("user");

if (!user) {
  alert("Please login first");
  window.location.href = "index.html";
}

/* =====================================
AUTO LOGOUT AFTER INACTIVITY
===================================== */

const TIMEOUT = 3 * 60 * 1000; // 3 minutes
let logoutTimer;

function resetLogoutTimer() {
  clearTimeout(logoutTimer);

  logoutTimer = setTimeout(() => {
    logoutUser();
  }, TIMEOUT);
}

function logoutUser() {
  alert("Session expired due to inactivity.");

  localStorage.removeItem("user");
  localStorage.removeItem("role");

  window.location.href = "index.html";
}

window.onload = function () {
  resetLogoutTimer();
  loadProducts();
};

document.onmousemove = resetLogoutTimer;
document.onkeydown = resetLogoutTimer;
document.onclick = resetLogoutTimer;
document.onscroll = resetLogoutTimer;

/* =====================================
SCRIPT URL
===================================== */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzObXviRyBq_uktnGna465i0DHdPww8NBVBtCMFoun0cQUKMmcn-R3ttIfqshR0_rno/exec";

/* =====================================
LOAD PRODUCTS
===================================== */

function loadProducts() {

  const url = SCRIPT_URL + "?action=getProducts";

  fetch(url)
    .then(res => res.json())
    .then(data => {

      const dropdown = document.getElementById("product");
      dropdown.innerHTML = '<option value="">Select Product</option>';

      if (data.status === "success") {

        data.products.forEach(product => {
          const option = document.createElement("option");
          option.value = product;
          option.textContent = product;
          dropdown.appendChild(option);
        });

      } else {
        dropdown.innerHTML = '<option>Error loading products</option>';
      }

    })
    .catch(err => {
      console.log(err);
      document.getElementById("product").innerHTML =
        '<option>Server error</option>';
    });
}

/* =====================================
SELL STOCK
===================================== */

function sellStock() {

  const product = document.getElementById("product").value;
  const units = document.getElementById("units").value;
  const msg = document.getElementById("msg");

  msg.className = "";
  msg.innerText = "";

  if (!product || !units) {
    msg.className = "error";
    msg.innerText = "Please select product and enter units";
    return;
  }

  const url =
    SCRIPT_URL +
    "?action=sellStock" +
    "&product=" + encodeURIComponent(product) +
    "&units=" + encodeURIComponent(units) +
    "&user=" + encodeURIComponent(user);

  fetch(url)
    .then(res => res.json())
    .then(data => {

      console.log(data);

      if (data.status === "success") {

        msg.className = "success";
        msg.innerText =
          "Sale completed successfully. Redirecting...";

        setTimeout(() => {
          window.location.replace("SINV.html");
        }, 1500);

      } else {
        msg.className = "error";
        msg.innerText =
          data.message || "Sale failed";
      }

    })
    .catch(err => {
      console.log(err);
      msg.className = "error";
      msg.innerText = "Server not reachable";
    });
}

/* =====================================
NAVIGATION
===================================== */

function goHome() {
  window.location.href = "SINV.html";
}

function manualLogout() {
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location.href = "index.html";
}

</script>

</body>
</html>
